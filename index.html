---
layout: default
title: "Fullstack Python"
---

<div class="posts">
  <p class="fs-1 text-warning">Últimos posts</p>
  <hr>
  {% for post in paginator.posts %}
  <article class="post">
    <h2><a class="text-decoration-none text-info" href="{{ site.baseurl }}{{ post.url }}">{{ post.title }}</a></h2>
    <div class="entry">
      {{ post.excerpt }}
    </div>

    <a href="{{ site.baseurl }}{{ post.url }}" class="read-more">Leer Más</a>
  </article>
  <hr>
  {% endfor %}

  <nav class="post-nav">
    {% if paginator.next_page %}
      <p><a href="{{ site.baseurl }}{{ paginator.next_page_path }}">Más antiguo</a></p>
    {% endif %}

    {% if paginator.previous_page %}
      <p><a href="{{ site.baseurl }}{{ paginator.previous_page_path }}">Más nuevo</a></p>
    {% endif %}
  </nav>
</div>
