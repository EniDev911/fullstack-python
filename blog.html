layout: default

<div class="row g-3 justify-content-center">
  {% for post in site.posts %}
  <div class="col-10 col-md-6 col-lg-4">
    {% include card_post.html
    id=forloop.index0
    title=post.title
    date=post.date
    href=post.url
    img=post.thumbnail
    %}
  </div>
  {% endfor %}
</div>
