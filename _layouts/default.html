<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta charset="utf-8">
  <title>{{ page.title }} - {{ site.title }}</title>
  <link rel="stylesheet" href="{{ "/assets/css/main.css" | relative_url }}">
  <!-- CDN CSS bootstrap -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css"
    crossorigin="anonymous" referrerpolicy="no-referrer">
</head>
<body>
  <!-- 👇 partial de la navegación -->
{% include navigation.html %}
<!-- HERO SECTION -->
<div class="text-secondary px-4 pt-5" style="height: 80vh; background: #191919">
  <div class="py-5 text-center">
    <h1 class="display-5 fw-bold text-white">{{ page.title }}</h1>
    <div class="col-lg-6 mx-auto">
      <p class="fs-3 mb-4" style="color: lightsalmon;">
        {{ page.subtitle }}
      </p>
    </div>
  </div>
  <div class="bg-dark shadow-lg col col-md-6 col-lg-9 mx-auto p-4 min-vh-100 rounded">
    {{ content }}
  </div>
</div>
<!-- END HERO SECTION -->
  <!-- JS BOOTSTRAP -->
  <script src="{{ "/assets/scripts/copyClipboard.js"  | relative_url }}"></script>
  <script src="{{ "/assets/scripts/popup.js"  | relative_url }}"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
</body>
</html>
