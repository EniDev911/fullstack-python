<nav class="navbar navbar-dark navbar-expand-lg fixed-top" style="background-color: #191919">
  <div class="container-fluid">
    <div class="collapse navbar-collapse" id="navbar">
      <div class="navbar-nav">
        {% for item in site.data.navigation %}
        <div class="vr border border-2 border-info"></div>
        <a href="{{ item.link | relative_url }}"
          class="nav-link fs-6 text-uppercase"
          {% if page.url == item.link %}
            style="color: lightsalmon;"
          {% endif %}>
          {{ item.name }}
        </a>
        {% endfor %}
      </div>
    </div>
  </div>
</nav>
