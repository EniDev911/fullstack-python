<div class="card text-light shadow" style="background-color: #191919">
	<div class="card-header text-center">
		<img src="{{ include.img | relative_url }}" alt="image" class="card-img-top" style="object-fit: contain;" height="210">
	</div>
	<div class="card-body">
		<h5 class="card-title text-warning">
			{{ include.title }}
		</h5>
		<p class="card-text">
			{{ include.text }}
		</p>
	</div>
</div>
