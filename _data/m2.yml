notas_finales:
  html: |-
    <!DOCTYPE html>
    <html lang="es" dir="ltr">
    <head>
      <meta charset="utf-8">
      <title>Probando JS</title>
      <!-- Bootstrap CDN -->
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha2/dist/css/bootstrap.min.css" rel="stylesheet"
      integrity="sha384-aFq/bzH65dt+w6FI2ooMVUpc+21e0SRygnTpmBvdBgSdnuTN7QbdgL+OapgHtvPp" crossorigin="anonymous">
    </head>
    <body>
      <div class="container">
        <h1 class="my-5">Notas Finales</h1>
        <div class="row mb-2">
          <div class="col-2 fw-bold">Nombre</div>
          <div class="col-2">Marco Contreras</div>
        </div>
        <div class="row mb-3">
          <div class="col-2 fw-bold">Carrera</div>
          <div class="col-2">Desarrollo web</div>
        </div>
        <table class="table">
          <thead class="bg-dark text-light">
            <tr>
              <th scope="col">Ramo</th>
              <th scope="col">Nota 1</th>
              <th scope="col">Nota 2</th>
              <th scope="col">Nota 3</th>
              <th scope="col">Promedio</th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr>
              <td id="html" class="fw-bold">HTML</td>
              <td id="html-nota1" class=""></td>
              <td id="html-nota2" class=""></td>
              <td id="html-nota3" class=""></td>
              <td id="html-promedio" class=""></td>
            </tr>
            <tr>
              <td id="css" class="fw-bold">CSS</td>
              <td id="css-nota1" class=""></td>
              <td id="css-nota2" class=""></td>
              <td id="css-nota3" class=""></td>
              <td id="css-promedio" class=""></td>
            </tr>
            <tr>
              <td id="js" class="fw-bold">JavaScript</td>
              <td id="js-nota1" class=""></td>
              <td id="js-nota2" class=""></td>
              <td id="js-nota3" class=""></td>
              <td id="js-promedio" class=""></td>
            </tr>
          </tbody>
        </table>
        <button class="btn btn-danger" id="btn_html">HTML</button>
        <button class="btn btn-primary" id="btn_css">CSS</button>
        <button class="btn btn-warning" id="btn_js">JS</button>
      </div>
      <script src="script.js"></script>
      <!-- JS BOOTSTRAP -->
      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js"
      crossorigin="anonymous"></script>
    </body>
    </html>

  js: |-
    // variables globales
    var validado = false;
    var nota1 = 0;
    var nota2 = 0;
    var nota3 = 0;
    var get = (id) => document.getElementById(id); //  Abreviamos su uso :D

    function validarEntradas(valores) {
      const regexp = /^([.,0-9])*$/
      return valores.every(valor => regexp.test(valor));
    }

    function obtenerSuma(acumulador, numeroActual) {
      return acumulador + Math.round(numeroActual);
    }

    function sacarPromedio(notas) {
      const total = notas.reduce(obtenerSuma , 0);
      return (total / notas.length).toFixed(2);
    }


    function pedirNotas(evento) {
      const modulo = evento.target.id.split("_");
      nota1 = +prompt("Escriba la nota 1 [" + modulo[1].toUpperCase() + "]:");
      nota2 = +prompt("Escriba la nota 2 [" + modulo[1].toUpperCase() + "]:");
      nota3 = +prompt("Escriba la nota 3 [" + modulo[1].toUpperCase() + "]:");
      const notas = [nota1, nota2, nota3];
      validado = validarEntradas(notas);
      if (!validado) {
        confirm('Números inválidos, ¿Quieres volver a intentar?')
        ? pedirNotas(evento)
        : 0
      } else {
        mostrarResultado(modulo[1], notas)
      }
    }


    function obtenerSuma(acumulador, numeroActual) {
      return acumulador + Math.round(numeroActual);
    }

    function sacarPromedio(notas) {
      const total = notas.reduce(obtenerSuma, 0);
      return (total / notas.length).toFixed(2);
    }

    function mostrarResultado(modulo, notas) {
      get(`${modulo}-nota1`).textContent = nota1;
      get(`${modulo}-nota2`).textContent = nota2;
      get(`${modulo}-nota3`).textContent = nota3;
      get(`${modulo}-promedio`).textContent = sacarPromedio(notas);
    }

    function pedirNotas(evento) {
      const modulo = evento.target.id.split("_");
      nota1 = +prompt("Escriba la nota 1 [" + modulo[1].toUpperCase() + "]:");
      nota2 = +prompt("Escriba la nota 2 [" + modulo[1].toUpperCase() + "]:");
      nota3 = +prompt("Escriba la nota 3 [" + modulo[1].toUpperCase() + "]:");
      const notas = [nota1, nota2, nota3];
      validado = validarEntradas(notas);
      if (!validado) {
        confirm('Números inválidos, ¿Quieres volver a intentar?')
        ? pedirNotas(evento)
        : 0
      } else {
        mostrarResultado(modulo[1], notas)
      }
    }

    let botones = document.querySelectorAll("button[id^='btn']")
    botones.forEach((boton) => {
      boton.addEventListener('click', pedirNotas)
    });
  url: demo/
