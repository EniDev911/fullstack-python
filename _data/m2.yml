  css: |-
    /* Fonts */
    @import url('https://fonts.googleapis.com/css2?family=Raleway:wght@200;400;500;700&display=swap');

    @import url('./normalize.css');
    /* GENERAL */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Raleway', sans-serif, monospace;
        background: #000;
        color: #fff;
        max-width: 100vw;
        min-height: 100vh;
    }

    /*HEADER PAGE*/

    .header {
        display: block;
        text-align: center;
        width: 100%;
        height: auto;
    }

    .header__title {
        text-align: center;
        text-transform: uppercase;
        font-size: 4vw;
        margin: 0;
        padding: .2vw 0;
    }

    .header__hero {
        display: block;
        height: 100vh;
        background: url("../img/bg-header.jpg");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
    }


    /*  SECTION DESCRIPTION */

    .description {
        display: block;
        width: 100%;
        min-height: 20vw;
        margin: auto;
        text-align: center;
        padding: 5% 0;
    }

    .description__text {
        display: inline-block;
        position: relative;
        vertical-align: middle;
        height: 100%;
        width: 45%;
        top: 3vw;
        color: #fff;
        margin: auto 5% auto auto;
        text-align: left;
        font-size: 1.5vw;
    }

    .description__image {
        display: inline-block;
        position: relative;
        vertical-align: top;
        width: 35%;
    }

    .description__image img {
        width: 100%;
        transition: filter .2s ease;
    }

    .description__image img:hover {
      filter: sepia(1);
    }


    /* SECTION FEATURES */

    .features {
        display: block;
        width: 100%;
        color: #fff;
        text-align: center;
        background-color: #1E1A13;
        padding-bottom: 4%;
    }

    .features__title {
        padding-top: 4%;
        padding-bottom: 2%;
        font-weight: normal;
        font-size: 4.5vw;
        height: auto;
    }

    .features__icons ul>li {
        display: inline-block;
        list-style: none;
        margin: 2vw 3% 0;
    }

    .features__icons ul>li>i {
        display: inline-block;
        vertical-align: top;
        margin-bottom: 0;
        font-size: 6vw;
    }

    .features__icons ul>li>span {
        display: block;
        font-size: 2.4vw;
        font-weight: lighter;
        margin-top: 1.5vw;
    }

    /* SECTION GALLERY */

    .gallery {
        display: block;
        width: 100%;
        height: 25vw;
        text-align: center;
        padding: 4% 0;

    }

    .gallery__img {
        display: inline-block;
        vertical-align: top;
        width: 25%;
        height: 100%;
        margin: 0 0.5%;
        overflow: hidden;
    }

    .gallery__img img {
        width: 100%;
        height: 100%;
        transition: transform .3s ease;
    }
    .gallery__img img:hover {
        transform: scale(1.3);
    }

    /* Footer */
    footer {
        height: 7vw;
        background-color: #1E1A13;
        text-align: center;
        line-height: 7vw;
        color: #fff;

    }

    footer>p {
        font-size: 1.8vw;
    }

    footer a {
        text-decoration: none;
        color: #fff;
        transition: color .3s ease;

    }

    footer a:visited {
        color: #cac;
    }

    footer a:hover {
        color: peru;
    }
    /* End */
  url: demo/

