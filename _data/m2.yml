    }

    * {
      padding: 0;
      margin: 0;
      box-sizing: border-box;
    }


    body {
      width: 100%;
      max-height: 100vw;
      font-family: 'Open Sans', sans-serif;
    }

    .navbar {
      background: var(--main-dark);
    }

    #hero-section {
      background-image: url(../img/bg-hero.jpg);
      background-repeat: no-repeat;
      background-size: cover;
      width: 100%;
      min-height: 100vh;
